<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Session Search</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #c084fc;
    --accent-dim: #7c3aed;
    --user-bg: #1a2332;
    --assistant-bg: #161b22;
    --system-bg: #1a1a2e;
    --tool-bg: #1a2a1a;
    --orange: #f0883e;
    --green: #3fb950;
    --blue: #58a6ff;
    --red: #f85149;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #ffffff;
      --surface: #f6f8fa;
      --surface2: #eaeef2;
      --border: #d0d7de;
      --text: #1f2328;
      --text-dim: #656d76;
      --accent: #8b5cf6;
      --accent-dim: #6d28d9;
      --user-bg: #eff6ff;
      --assistant-bg: #f6f8fa;
      --system-bg: #fef3c7;
      --tool-bg: #ecfdf5;
      --orange: #d97706;
      --green: #16a34a;
      --blue: #2563eb;
      --red: #dc2626;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* --- Header --- */
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .search-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  #searchInput {
    flex: 1;
    padding: 8px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  #searchInput:focus { border-color: var(--accent); }

  .mode-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .mode-btn {
    padding: 8px 14px;
    background: var(--bg);
    color: var(--text-dim);
    border: none;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
  }

  .mode-btn.active { background: var(--accent-dim); color: white; }
  .mode-btn:hover:not(.active) { background: var(--surface2); }

  .stats {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-dim);
  }

  /* --- Main layout --- */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* --- Sidebar (projects) --- */
  .sidebar {
    width: 260px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
    background: var(--surface);
  }

  .sidebar-header {
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }

  .project-item {
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.1s;
  }

  .project-item:hover { background: var(--surface2); color: var(--text); }
  .project-item.active { background: var(--accent-dim); color: white; }

  .project-name {
    font-weight: 500;
  }

  .project-path {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .project-item.active .project-path { color: rgba(255,255,255,0.7); }

  /* --- Results panel --- */
  .results-panel {
    flex: 1;
    overflow-y: auto;
    min-width: 0;
  }

  .results-panel.has-session { flex: 0 0 400px; border-right: 1px solid var(--border); overflow-y: auto; }

  .result-item {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }

  .result-item:hover { background: var(--surface2); }
  .result-item.active { background: var(--accent-dim); }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .result-project {
    font-size: 12px;
    color: var(--blue);
    font-weight: 500;
  }

  .result-item.active .result-project { color: rgba(255,255,255,0.8); }

  .result-time {
    font-size: 11px;
    color: var(--text-dim);
  }

  .result-prompts {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .result-prompt {
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .result-prompt mark {
    background: var(--accent-dim);
    color: white;
    border-radius: 2px;
    padding: 0 2px;
  }

  .result-item.active .result-prompt { color: white; }

  .result-more {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* --- Session viewer --- */
  .session-panel {
    flex: 1;
    overflow-y: auto;
    display: none;
    min-width: 0;
  }

  .session-panel.visible { display: flex; flex-direction: column; }

  .session-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 2;
    flex-shrink: 0;
  }

  .session-header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .session-title {
    font-size: 14px;
    font-weight: 600;
  }

  .session-close {
    padding: 4px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 12px;
  }

  .session-close:hover { background: var(--border); color: var(--text); }

  .open-btn {
    padding: 4px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
  }

  .open-btn:hover { background: var(--border); color: var(--text); }
  .open-btn.ghostty { border-color: var(--accent-dim); color: var(--accent); }
  .open-btn.ghostty:hover { background: var(--accent-dim); color: white; }
  .open-btn.vscode { border-color: var(--blue); color: var(--blue); }
  .open-btn.vscode:hover { background: rgba(88,166,255,0.2); }
  .open-btn.copy:hover { background: var(--border); }

  .open-btn.launched {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }

  .result-actions {
    display: flex;
    gap: 4px;
    float: right;
    margin-left: 8px;
  }

  .result-open {
    padding: 1px 6px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 10px;
    transition: all 0.15s;
  }

  .result-open:hover { border-color: var(--accent); color: var(--accent); }
  .result-open.launched { border-color: var(--green); color: var(--green); }

  .session-meta {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .session-filter {
    margin-top: 8px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 3px 10px;
    font-size: 11px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.1s;
  }

  .filter-btn.active { background: var(--accent-dim); border-color: var(--accent-dim); color: white; }
  .filter-btn:hover:not(.active) { border-color: var(--text-dim); color: var(--text); }

  .session-messages {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  .message {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    line-height: 1.6;
  }

  .message-user { background: var(--user-bg); }
  .message-assistant { background: var(--assistant-bg); }
  .message-system { background: var(--system-bg); }
  .message-tool_result, .message-tool_use { background: var(--tool-bg); }

  .message-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .message-user .message-label { color: var(--green); }
  .message-assistant .message-label { color: var(--accent); }
  .message-system .message-label { color: var(--orange); }
  .message-tool_result .message-label, .message-tool_use .message-label { color: var(--blue); }

  .message-content {
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 600px;
    overflow-y: auto;
  }

  .message-content code {
    background: rgba(255,255,255,0.08);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 12px;
  }

  .message-time {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  .message.collapsed .message-content {
    max-height: 80px;
    overflow: hidden;
    position: relative;
  }

  .message.collapsed .message-content::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40px;
    background: linear-gradient(transparent, var(--surface));
    pointer-events: none;
  }

  .message-user.collapsed .message-content::after { background: linear-gradient(transparent, var(--user-bg)); }
  .message-system.collapsed .message-content::after { background: linear-gradient(transparent, var(--system-bg)); }
  .message-tool_result.collapsed .message-content::after,
  .message-tool_use.collapsed .message-content::after { background: linear-gradient(transparent, var(--tool-bg)); }

  .expand-btn {
    font-size: 11px;
    color: var(--accent);
    cursor: pointer;
    margin-top: 4px;
    display: inline-block;
  }

  .expand-btn:hover { text-decoration: underline; }

  /* --- Empty / loading states --- */
  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 14px;
    padding: 40px;
    text-align: center;
  }

  .loading {
    color: var(--accent);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* --- Scrollbar --- */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* --- Session search within viewer --- */
  .session-search-row {
    margin-top: 8px;
    display: flex;
    gap: 6px;
  }

  .session-search-input {
    flex: 1;
    padding: 4px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-size: 12px;
    outline: none;
  }

  .session-search-input:focus { border-color: var(--accent); }

  .active-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse-dot 2s infinite;
    margin-right: 6px;
    vertical-align: middle;
  }

  .active-dot.stale {
    background: var(--orange);
    animation: none;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .active-item {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }

  .active-item:hover { background: var(--surface2); }
  .active-item.active { background: var(--accent-dim); }

  .active-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    margin-bottom: 6px;
  }

  .active-status .pid {
    color: var(--text-dim);
    font-family: monospace;
    font-size: 11px;
  }

  .active-status .running { color: var(--green); font-weight: 500; }
  .active-status .recent { color: var(--orange); font-weight: 500; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 10px 18px;
    background: var(--surface2);
    border: 1px solid var(--green);
    border-radius: 8px;
    color: var(--green);
    font-size: 13px;
    z-index: 1000;
    animation: toast-in 0.2s ease, toast-out 0.3s ease 2.5s forwards;
  }

  @keyframes toast-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toast-out { to { opacity: 0; transform: translateY(10px); } }

  mark.session-highlight {
    background: var(--orange);
    color: var(--bg);
    border-radius: 2px;
    padding: 0 1px;
  }

  .result-names {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }

  .session-name {
    font-size: 13px;
    font-weight: 500;
    padding: 1px 8px;
    border-radius: 4px;
  }

  .session-name.custom {
    background: var(--accent-dim);
    color: white;
  }

  .session-name.slug {
    background: var(--surface2);
    color: var(--text-dim);
    font-family: monospace;
    font-size: 12px;
  }

  .result-item.active .session-name.slug {
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.8);
  }
</style>
</head>
<body>

<header>
  <h1>Claude Session Search</h1>
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="Search sessions... (use -term to exclude)" autofocus>
    <div class="mode-toggle">
      <button class="mode-btn" data-mode="active">Active</button>
      <button class="mode-btn active" data-mode="prompts">Prompts</button>
      <button class="mode-btn" data-mode="names">Names</button>
      <button class="mode-btn" data-mode="fulltext">Full Text</button>
    </div>
  </div>
  <div class="stats" id="stats"></div>
</header>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">Projects</div>
    <div id="projectList"></div>
  </div>

  <div class="results-panel" id="resultsPanel">
    <div class="empty-state" id="resultsEmpty">Type to search across all sessions, or select a project</div>
    <div id="resultsList"></div>
  </div>

  <div class="session-panel" id="sessionPanel">
    <div class="session-header" id="sessionHeader">
      <div class="session-header-top">
        <span class="session-title" id="sessionTitle"></span>
        <div style="display:flex;gap:6px;">
          <button class="open-btn ghostty" id="openGhostty">Ghostty</button>
          <button class="open-btn vscode" id="openVSCode">VS Code</button>
          <button class="open-btn copy" id="openCopy">Copy</button>
          <button class="session-close" id="sessionClose">Close</button>
        </div>
      </div>
      <div class="session-meta" id="sessionMeta"></div>
      <div class="session-filter" id="sessionFilter"></div>
      <div class="session-search-row">
        <input type="text" class="session-search-input" id="sessionSearchInput" placeholder="Search within session...">
      </div>
    </div>
    <div class="session-messages" id="sessionMessages"></div>
  </div>
</div>

<script>
const API = '';
let searchMode = 'prompts';
let activeProject = null;
let activeSessionId = null;
let currentMessages = [];
let activeFilters = new Set(['user', 'assistant']);
let debounceTimer = null;

let activeRefreshInterval = null;

// --- Init ---
async function init() {
  const projects = await fetchJSON('/api/projects');
  renderProjects(projects);
  document.getElementById('stats').textContent = `${projects.length} projects indexed`;
  // Start on active sessions view
  setMode('active');
}

async function loadActiveSessions() {
  showLoading();
  const sessions = await fetchJSON('/api/active');
  renderActiveSessions(sessions);
  document.getElementById('stats').textContent = `${sessions.length} active session${sessions.length !== 1 ? 's' : ''}`;
}

function renderActiveSessions(sessions) {
  const list = document.getElementById('resultsList');
  const empty = document.getElementById('resultsEmpty');
  list.innerHTML = '';

  if (sessions.length === 0) {
    empty.style.display = 'flex';
    empty.textContent = 'No active sessions';
    return;
  }

  empty.style.display = 'none';

  for (const s of sessions) {
    const el = document.createElement('div');
    el.className = 'active-item';
    if (s.sessionId === activeSessionId) el.classList.add('active');

    const project = (s.project || '').split('/').pop() || s.sessionId.substring(0, 8);
    const dotClass = s.hasProcess ? '' : ' stale';
    const statusLabel = s.hasProcess ? 'running' : 'recent';
    const statusText = s.hasProcess ? 'Running' : 'Recent activity';
    const pidText = s.pid ? `PID ${s.pid}` : '';
    const prompts = (s.prompts || []).slice(-3);
    const time = formatDate(s.lastTimestamp || s.firstTimestamp);

    el.innerHTML = `
      <div class="active-status">
        <span class="active-dot${dotClass}"></span>
        <span class="${statusLabel}">${statusText}</span>
        <span class="pid">${pidText}</span>
        <span class="result-time" style="margin-left:auto;">
          <span class="result-actions">
            <button class="result-open" data-app="ghostty" title="Open in Ghostty">G</button>
            <button class="result-open" data-app="vscode" title="Open in VS Code">V</button>
          </span>
          ${time}
        </span>
      </div>
      <div class="result-header">
        <span class="result-project">${esc(project)}</span>
      </div>
      <div class="result-prompts">
        ${prompts.map(p => `<div class="result-prompt">${esc(p.display)}</div>`).join('')}
      </div>
    `;

    el.querySelectorAll('.result-open').forEach(btn => {
      btn.onclick = (e) => { e.stopPropagation(); openInApp(s.sessionId, btn.dataset.app, btn); };
    });
    el.onclick = () => openSession(s, el);
    list.appendChild(el);
  }
}

// --- Fetch helper ---
async function fetchJSON(url) {
  const res = await fetch(API + url);
  return res.json();
}

// --- Projects sidebar ---
function renderProjects(projects) {
  const list = document.getElementById('projectList');
  list.innerHTML = '';
  for (const p of projects) {
    const el = document.createElement('div');
    el.className = 'project-item';
    const name = p.split('/').pop() || p;
    const shortPath = p.replace(/^\/Users\/\w+\//, '~/');
    el.innerHTML = `<div class="project-name">${esc(name)}</div><div class="project-path">${esc(shortPath)}</div>`;
    el.onclick = () => selectProject(p, el);
    list.appendChild(el);
  }
}

function selectProject(project, el) {
  document.querySelectorAll('.project-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  activeProject = project;
  closeSession();
  loadProjectSessions(project);
}

async function loadProjectSessions(project) {
  showLoading();
  const sessions = await fetchJSON(`/api/project-sessions?project=${encodeURIComponent(project)}`);
  renderResults(sessions);
  document.getElementById('stats').textContent = `${sessions.length} sessions in project`;
}

// --- Search ---
document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => doSearch(e.target.value), 250);
});

document.getElementById('searchInput').addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    e.target.value = '';
    clearResults();
  }
});

async function doSearch(query) {
  if (!query.trim()) {
    if (activeProject) {
      loadProjectSessions(activeProject);
    } else if (searchMode === 'active') {
      loadActiveSessions();
    } else if (searchMode === 'names') {
      // Show all named sessions when empty query
      showLoading();
      const results = await fetchJSON(`/api/search?q=&mode=names`);
      renderNameResults(results, '');
      document.getElementById('stats').textContent = `${results.length} named sessions`;
      return;
    } else {
      clearResults();
    }
    return;
  }

  // Switch to prompts mode if user starts typing while on active tab
  if (searchMode === 'active') {
    setMode('prompts');
  }

  showLoading();
  const results = await fetchJSON(`/api/search?q=${encodeURIComponent(query)}&mode=${searchMode}`);

  if (searchMode === 'fulltext') {
    renderFulltextResults(results, query);
  } else if (searchMode === 'names') {
    renderNameResults(results, query);
  } else {
    renderResults(results, query);
  }

  document.getElementById('stats').textContent = `${results.length} sessions found`;
}

// --- Mode toggle ---
function setMode(mode) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.mode-btn[data-mode="${mode}"]`)?.classList.add('active');
  searchMode = mode;

  // Stop auto-refresh if leaving active mode
  if (activeRefreshInterval && mode !== 'active') {
    clearInterval(activeRefreshInterval);
    activeRefreshInterval = null;
  }

  if (mode === 'active') {
    loadActiveSessions();
    // Auto-refresh every 10s
    activeRefreshInterval = setInterval(loadActiveSessions, 10000);
  } else if (mode === 'names') {
    const q = document.getElementById('searchInput').value;
    doSearch(q);
  }
}

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const mode = btn.dataset.mode;
    setMode(mode);
    if (mode !== 'active') {
      const q = document.getElementById('searchInput').value;
      if (q.trim()) doSearch(q);
    }
  });
});

// --- Render results ---
function renderResults(sessions, query) {
  const list = document.getElementById('resultsList');
  const empty = document.getElementById('resultsEmpty');
  list.innerHTML = '';

  if (sessions.length === 0) {
    empty.style.display = 'flex';
    empty.textContent = 'No sessions found';
    return;
  }

  empty.style.display = 'none';

  for (const s of sessions) {
    const el = document.createElement('div');
    el.className = 'result-item';
    if (s.sessionId === activeSessionId) el.classList.add('active');

    const project = (s.project || '').split('/').pop() || s.project;
    const time = formatDate(s.lastTimestamp || s.firstTimestamp);
    const prompts = (s.prompts || []).slice(0, 4);
    const remaining = (s.prompts || []).length - 4;

    el.innerHTML = `
      <div class="result-header">
        <span class="result-project">${esc(project)}</span>
        <span class="result-time">
          <span class="result-actions">
            <button class="result-open" data-app="ghostty" title="Open in Ghostty">G</button>
            <button class="result-open" data-app="vscode" title="Open in VS Code">V</button>
          </span>
          ${time}
        </span>
      </div>
      <div class="result-prompts">
        ${prompts.map(p => `<div class="result-prompt">${highlight(esc(p.display), query)}</div>`).join('')}
      </div>
      ${remaining > 0 ? `<div class="result-more">+${remaining} more prompts</div>` : ''}
    `;

    el.querySelectorAll('.result-open').forEach(btn => {
      btn.onclick = (e) => { e.stopPropagation(); openInApp(s.sessionId, btn.dataset.app, btn); };
    });
    el.onclick = () => openSession(s, el);
    list.appendChild(el);
  }
}

function renderFulltextResults(results, query) {
  const list = document.getElementById('resultsList');
  const empty = document.getElementById('resultsEmpty');
  list.innerHTML = '';

  if (results.length === 0) {
    empty.style.display = 'flex';
    empty.textContent = 'No matches found';
    return;
  }

  empty.style.display = 'none';

  for (const r of results) {
    const el = document.createElement('div');
    el.className = 'result-item';

    const project = (r.project || r.projectDir || '').split('/').pop();

    el.innerHTML = `
      <div class="result-header">
        <span class="result-project">${esc(project)}</span>
        <span class="result-time">
          <span class="result-actions">
            <button class="result-open" data-app="ghostty" title="Open in Ghostty">G</button>
            <button class="result-open" data-app="vscode" title="Open in VS Code">V</button>
          </span>
          ${r.matches.length} matches
        </span>
      </div>
      <div class="result-prompts">
        ${r.matches.slice(0, 3).map(m => `<div class="result-prompt">${highlight(esc(stripTags(m.snippet)), query)}</div>`).join('')}
      </div>
    `;

    el.querySelectorAll('.result-open').forEach(btn => {
      btn.onclick = (e) => { e.stopPropagation(); openInApp(r.sessionId, btn.dataset.app, btn); };
    });
    el.onclick = () => openSession({ sessionId: r.sessionId, projectDir: r.projectDir, project: r.project }, el);
    list.appendChild(el);
  }
}

function renderNameResults(results, query) {
  const list = document.getElementById('resultsList');
  const empty = document.getElementById('resultsEmpty');
  list.innerHTML = '';

  if (results.length === 0) {
    empty.style.display = 'flex';
    empty.textContent = query ? 'No sessions found matching that name' : 'Type to search by session name (slug or custom title)';
    return;
  }

  empty.style.display = 'none';

  for (const s of results) {
    const el = document.createElement('div');
    el.className = 'result-item';

    const prompts = (s.prompts || []).slice(0, 3);

      ? `<span class="session-name custom">${highlight(esc(s.customTitle), query)}</span>`
      : '';
    const slugDisplay = s.slug
      ? `<span class="session-name slug">${highlight(esc(s.slug), query)}</span>`
      : '';

    el.innerHTML = `
      <div class="result-header">
        <span class="result-project">${esc(project)}</span>

            <button class="result-open" data-app="vscode" title="Open in VS Code">V</button>
          </span>
          ${time}
        </span>
      </div>
      <div class="result-names">${nameDisplay}${slugDisplay}</div>

      </div>

    el.querySelectorAll('.result-open').forEach(btn => {

    });
    el.onclick = () => openSession(s, el);
    list.appendChild(el);
  }

// --- Open session ---
async function openSession(session, el) {
  document.querySelectorAll('.result-item').forEach(e => e.classList.remove('active'));
  if (el) el.classList.add('active');
  activeSessionId = session.sessionId;

  const panel = document.getElementById('sessionPanel');
  const resultsPanel = document.getElementById('resultsPanel');
  const messagesEl = document.getElementById('sessionMessages');

  panel.classList.add('visible');
  resultsPanel.classList.add('has-session');
  messagesEl.innerHTML = '<div class="empty-state loading">Loading session...</div>';

  const projectDir = session.projectDir || null;
  const url = projectDir
    ? `/api/session/${encodeURIComponent(projectDir)}/${session.sessionId}`
    : `/api/session/${session.sessionId}`;

  const data = await fetchJSON(url);

  if (data.error) {
    messagesEl.innerHTML = `<div class="empty-state">${data.error}</div>`;
    return;
  }

  currentMessages = data.messages;

  const project = (session.project || '').split('/').pop() || session.sessionId;
  document.getElementById('sessionTitle').textContent = project;
  document.getElementById('sessionMeta').textContent = `Session ${session.sessionId} — ${currentMessages.length} messages`;

  // Build filter buttons from message types present
  const types = new Set(currentMessages.map(m => m.type).filter(Boolean));
  renderFilterButtons(types);
  renderMessages();
}

function renderFilterButtons(types) {
  const container = document.getElementById('sessionFilter');
  container.innerHTML = '';
  const ordered = ['user', 'assistant', 'system', 'tool_use', 'tool_result'];
  const typeArr = ordered.filter(t => types.has(t));
  // add any types not in ordered
  for (const t of types) {
    if (!typeArr.includes(t)) typeArr.push(t);
  }

  for (const t of typeArr) {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeFilters.has(t) ? ' active' : '');
    btn.textContent = t;
    btn.onclick = () => {
      if (activeFilters.has(t)) activeFilters.delete(t);
      else activeFilters.add(t);
      btn.classList.toggle('active');
      renderMessages();
    };
    container.appendChild(btn);
  }
}

function renderMessages() {
  const container = document.getElementById('sessionMessages');
  const searchTerm = document.getElementById('sessionSearchInput').value.trim().toLowerCase();
  container.innerHTML = '';

  let count = 0;
  for (const msg of currentMessages) {
    if (!activeFilters.has(msg.type)) continue;

    const content = extractContent(msg);
    if (!content.trim()) continue;

    if (searchTerm && !content.toLowerCase().includes(searchTerm)) continue;

    count++;
    const el = document.createElement('div');
    const isLong = content.length > 500;
    el.className = `message message-${msg.type}${isLong ? ' collapsed' : ''}`;

    let displayContent = esc(content);
    if (searchTerm) {
      displayContent = highlightSession(displayContent, searchTerm);
    }

    el.innerHTML = `
      <div class="message-label">${msg.type}${msg.subtype ? ` / ${msg.subtype}` : ''}</div>
      <div class="message-content">${displayContent}</div>
      ${isLong ? '<span class="expand-btn">Show more</span>' : ''}
      ${msg.timestamp ? `<div class="message-time">${formatDateTime(msg.timestamp)}</div>` : ''}
    `;

    if (isLong) {
      const expandBtn = el.querySelector('.expand-btn');
      expandBtn.onclick = (e) => {
        e.stopPropagation();
        el.classList.toggle('collapsed');
        expandBtn.textContent = el.classList.contains('collapsed') ? 'Show more' : 'Show less';
      };
    }

    container.appendChild(el);
  }

  if (count === 0) {
    container.innerHTML = '<div class="empty-state">No matching messages with current filters</div>';
  }
}

// --- Session search ---
document.getElementById('sessionSearchInput').addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(renderMessages, 200);
});

// --- Close session ---
document.getElementById('sessionClose').addEventListener('click', closeSession);

function closeSession() {
  activeSessionId = null;
  currentMessages = [];
  document.getElementById('sessionPanel').classList.remove('visible');
  document.getElementById('resultsPanel').classList.remove('has-session');
  document.querySelectorAll('.result-item').forEach(e => e.classList.remove('active'));
}

// --- Open session in app ---
document.getElementById('openGhostty').addEventListener('click', (e) => {
  if (activeSessionId) openInApp(activeSessionId, 'ghostty', e.target);
});

document.getElementById('openVSCode').addEventListener('click', (e) => {
  if (activeSessionId) openInApp(activeSessionId, 'vscode', e.target);
});

document.getElementById('openCopy').addEventListener('click', (e) => {
  if (activeSessionId) {
    const cmd = `claude --resume ${activeSessionId}`;
    navigator.clipboard.writeText(cmd).then(() => {
      flashButton(e.target, 'Copied!');
    });
  }
});

async function openInApp(sessionId, app, btnEl) {
  const orig = btnEl.textContent;
  btnEl.textContent = '...';
  try {
    const res = await fetch(`/api/open?session=${sessionId}&app=${app}`);
    const data = await res.json();
    flashButton(btnEl, 'OK', orig);
    if (data.notify) showNotification(data.notify);
  } catch {
    flashButton(btnEl, 'Err', orig);
  }
}

function flashButton(btnEl, msg, restoreTo) {
  const orig = restoreTo || btnEl.textContent;
  btnEl.textContent = msg;
  btnEl.classList.add('launched');
  setTimeout(() => { btnEl.textContent = orig; btnEl.classList.remove('launched'); }, 1500);
}

function showNotification(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// --- Helpers ---
function extractContent(msg) {
  if (typeof msg.content === 'string') return msg.content;

  if (msg.message?.content) {
    const c = msg.message.content;
    if (typeof c === 'string') return c;
    if (Array.isArray(c)) {
      return c
        .filter(b => b.type === 'text')
        .map(b => b.text)
        .join('\n');
    }
  }

  // tool_use / tool_result
  if (msg.type === 'tool_use' || msg.type === 'tool_result') {
    let text = '';
    if (msg.name) text += `[${msg.name}] `;
    if (typeof msg.input === 'object' && msg.input) {
      // Show command or key fields
      const inp = msg.input;
      if (inp.command) text += inp.command;
      else if (inp.file_path) text += inp.file_path;
      else if (inp.pattern) text += inp.pattern;
      else text += JSON.stringify(inp).substring(0, 500);
    }
    if (typeof msg.content === 'object' && msg.content) {
      if (Array.isArray(msg.content)) {
        text += msg.content.map(c => c.text || '').join('\n');
      }
    }
    return text;
  }

  return '';
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function highlight(text, query) {
  if (!query) return text;
  const terms = query.toLowerCase().split(/\s+/).filter(Boolean);
  for (const term of terms) {
    if (term.startsWith('-')) continue; // skip exclude terms
    const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    text = text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
  }
  return text;
}

function highlightSession(text, term) {
  if (!term) return text;
  const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark class="session-highlight">$1</mark>');
}

function stripTags(s) {
  if (!s) return '';
  return s.replace(/<[^>]*>/g, '');
}

function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(typeof ts === 'string' ? ts : ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 86400000) {
    return d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
  }
  if (diff < 7 * 86400000) {
    return d.toLocaleDateString(undefined, { weekday: 'short', hour: '2-digit', minute: '2-digit' });
  }
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
}

function formatDateTime(ts) {
  if (!ts) return '';
  const d = new Date(typeof ts === 'string' ? ts : ts);
  return d.toLocaleString();
}

function showLoading() {
  document.getElementById('resultsList').innerHTML = '';
  const empty = document.getElementById('resultsEmpty');
  empty.style.display = 'flex';
  empty.innerHTML = '<span class="loading">Searching...</span>';
}

function clearResults() {
  document.getElementById('resultsList').innerHTML = '';
  const empty = document.getElementById('resultsEmpty');
  empty.style.display = 'flex';
  empty.textContent = 'Type to search across all sessions, or select a project';
}

// --- Keyboard shortcuts ---
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  if (e.key === 'Escape') {
    if (document.getElementById('sessionPanel').classList.contains('visible')) {
      closeSession();
    }
  }
});

init();
</script>
